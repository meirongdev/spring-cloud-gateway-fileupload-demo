server:
  port: 8080

spring:
  application:
    name: gateway
  servlet:
    multipart:
      # The gateway is a pure proxy: never let Spring parse/buffer a multipart
      # body here. The raw request stream is forwarded as-is.
      enabled: false

logging:
  level:
    org.springframework.cloud.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        # Demo only — exposes internals over unauthenticated HTTP. Do NOT do this in prod.
        include: health,info,env,beans,mappings,configprops,conditions,metrics,loggers
  endpoint:
    env:
      show-values: always      # show real values instead of "******" (demo convenience)
    configprops:
      show-values: always
