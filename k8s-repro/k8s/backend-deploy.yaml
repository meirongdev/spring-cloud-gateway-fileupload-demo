apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend413
  namespace: demo413
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend413
  template:
    metadata:
      labels:
        app: backend413
    spec:
      containers:
        - name: backend413
          image: backend413:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 2
            failureThreshold: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend413
  namespace: demo413
spec:
  selector:
    app: backend413
  ports:
    - port: 8081
      targetPort: 8081
